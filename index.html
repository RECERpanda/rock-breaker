<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROCK BREAKER</title>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/pose.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    background:black;
    color:white;
}

/* =========================================
CANVAS
========================================= */

#bg{
    position:fixed;
    inset:0;
    z-index:0;
}

/* =========================================
UI
========================================= */

#ui{
    position:fixed;
    inset:0;
    z-index:10;
}

.screen{
    position:absolute;
    inset:0;
}

/* =========================================
MENU
========================================= */

#menu{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:24px;

    background:
        radial-gradient(circle at center,
        rgba(120,120,120,.12),
        rgba(0,0,0,.96)),
        linear-gradient(#050505,#000);
}

.title{
    font-size:74px;
    font-weight:900;
    letter-spacing:10px;

    margin-bottom:40px;

    text-shadow:
        0 0 10px white,
        0 0 40px #888,
        0 0 80px #555;
}

.btn{
    width:320px;
    padding:20px;

    border:none;
    border-radius:18px;

    font-size:24px;
    font-weight:800;

    cursor:pointer;

    color:white;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.2);

    backdrop-filter:blur(10px);

    transition:.25s;

    box-shadow:
        0 0 20px rgba(255,255,255,.15);
}

.btn:hover{
    transform:translateY(-5px) scale(1.03);

    border-color:#66ddff;

    box-shadow:
        0 0 20px rgba(255,255,255,.3),
        0 0 60px rgba(0,200,255,.4);
}

/* =========================================
GAME UI
========================================= */

#counter{
    position:absolute;

    top:55px;
    left:50%;

    transform:translateX(-50%);

    font-size:90px;
    font-weight:900;

    text-shadow:
        0 0 20px white,
        0 0 40px cyan,
        0 0 80px cyan;
}

#timer{
    position:absolute;

    top:20px;
    right:30px;

    font-size:34px;
    font-weight:700;

    text-shadow:0 0 12px white;
}

#status{
    position:absolute;

    top:20px;
    left:20px;

    font-size:18px;

    opacity:.7;
}

#webcam {
    position: absolute;
    right: 20px;
    bottom: 20px;
    width: 260px;
    border-radius: 18px;
    border: 2px solid rgba(255,255,255,.8); /* 테두리 더 밝게 */
    opacity: 1; /* 투명도 100%로 선명하게! */
    transform: scaleX(-1); /* 좌우 반전 유지 */
    transition: width 1s ease-in-out; /* 크기가 서서히 변하는 애니메이션 */
    filter: none !important; 
    z-index: 9999 !important;
}

/* 게임 중일 때 웹캠 크기를 2배(520px)로 키우는 클래스 */
#webcam.playing {
    width: 520px; 
}

/* 랭킹 리스트 스크롤 추가 (기존 코드의 .rankItem 위쪽에 넣어주세요) */
#rankingList {
    max-height: 350px; /* 5개 정도 보이고 스크롤 생김 */
    overflow-y: auto;
    margin-bottom: 20px;
}

/* 스크롤바 디자인 */
#rankingList::-webkit-scrollbar { width: 8px; }
#rankingList::-webkit-scrollbar-thumb { 
    background: rgba(255, 255, 255, 0.3); 
    border-radius: 4px; 
}

/* =========================================
OVERLAY
========================================= */

#overlay{
    position:absolute;
    inset:0;

    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:rgba(0,0,0,.72);

    backdrop-filter:blur(8px);

    z-index:100;
}

#overlayText{
    font-size:42px;
    font-weight:800;

    opacity:0;

    transition:1s;

    text-shadow:
        0 0 20px white,
        0 0 40px white;

    white-space:pre-line;
}

#countdown{
    margin-top:35px;

    font-size:120px;
    font-weight:900;

    opacity:0;

    text-shadow:
        0 0 20px white,
        0 0 60px cyan;
}

#guide{
    margin-top:25px;

    font-size:28px;

    opacity:0;

    transition:1s;
}

/* =========================================
RANKING
========================================= */

#rankingScreen,
#endScreen{
    display:none;

    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:rgba(0,0,0,.9);

    backdrop-filter:blur(8px);

    z-index:80;
}

.panelTitle{
    font-size:58px;
    font-weight:900;

    margin-bottom:24px;

    text-shadow:0 0 20px white;
}

.rankItem{
    width:540px;

    padding:16px 22px;

    border-radius:18px;

    margin:8px;

    background:rgba(255,255,255,.06);

    border:1px solid rgba(255,255,255,.12);

    font-size:24px;
}

.gold{
    border:2px solid gold;
    color:gold;
    box-shadow:0 0 30px gold;
}

.silver{
    border:2px solid silver;
    box-shadow:0 0 30px silver;
}

.bronze{
    border:2px solid #d99050;
    color:#ffbf80;
    box-shadow:0 0 30px #d99050;
}

input{
    width:320px;

    padding:16px;

    border:none;

    border-radius:14px;

    background:rgba(255,255,255,.12);

    color:white;

    font-size:22px;

    margin-top:20px;
}

#saveMessage{
    margin-top:14px;

    color:#7dff9d;

    opacity:0;

    transition:.3s;
}

.shake{
    animation:shake .16s;
}

@keyframes shake{

    0%{
        transform:translate(0);
    }

    25%{
        transform:translate(-6px,2px);
    }

    50%{
        transform:translate(6px,-2px);
    }

    75%{
        transform:translate(-4px,3px);
    }

    100%{
        transform:translate(0);
    }
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="ui">

    <!-- MENU -->
    <div id="menu" class="screen">

        <div class="title">
            ROCK BREAKER
        </div>

        <button class="btn" id="startBtn">
            게임 시작
        </button>

        <button class="btn" id="rankingBtn">
            랭킹
        </button>

    </div>

    <!-- GAME UI -->
    <div id="counter">0</div>

    <div id="timer">0.00s</div>

    <div id="status">대기 중</div>

    <!-- VIDEO -->
    <video
        id="webcam"
        autoplay
        muted
        playsinline
    ></video>

    <!-- OVERLAY -->
    <div id="overlay">

        <div id="overlayText"></div>

        <div id="countdown"></div>

        <div id="guide">
            두 손을 깍지 낀 채 머리 위로 올린 후 강하게 내려치세요!
        </div>

    </div>

    <!-- RANKING -->
    <div id="rankingScreen" class="screen">

        <div class="panelTitle">
            RANKING
        </div>

        <div id="rankingList"></div>

        <button class="btn" id="resetRankingBtn" style="margin-bottom:12px; background:rgba(255,50,50,.2); border-color:rgba(255,50,50,.5);">
            기록 초기화
        </button>
        <button class="btn" id="rankingCloseBtn">
            닫기
        </button>

    </div>

    <!-- END -->
    <div id="endScreen" class="screen">

        <div class="panelTitle">
            바위 파괴 성공
        </div>

        <div
            id="finalTime"
            style="font-size:40px;"
        ></div>

        <input
            id="nickname"
            maxlength="12"
            placeholder="닉네임 입력"
        >

        <button class="btn" id="saveBtn">
            기록 저장
        </button>

        <div id="saveMessage">
            기록이 저장되었습니다!
        </div>

        <button class="btn" id="backBtn">
            메인 메뉴
        </button>

    </div>

</div>

<!-- AUDIO -->
<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="hitSound" src="hit.mp3"></audio>
<audio id="bombSound" src="bomb.mp3"></audio>

<script>

/* =========================================
THREE
========================================= */

const canvas =
    document.getElementById("bg");

const renderer =
    new THREE.WebGLRenderer({
        canvas,
        antialias:true
    });

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
);

const scene = new THREE.Scene();

scene.fog =
    new THREE.Fog(
        0x000000,
        10,
        60
    );

const camera =
    new THREE.PerspectiveCamera(
        60,
        window.innerWidth /
        window.innerHeight,
        0.1,
        1000
    );

camera.position.z = 12;

/* =========================================
LIGHT
========================================= */

const ambient =
    new THREE.AmbientLight(
        0xffffff,
        1.2
    );

scene.add(ambient);

const blueLight =
    new THREE.PointLight(
        0x66ccff,
        80,
        100
    );

blueLight.position.set(0,8,8);

scene.add(blueLight);

const orangeLight =
    new THREE.PointLight(
        0xff8844,
        20,
        80
    );

orangeLight.position.set(-8,2,5);

scene.add(orangeLight);

/* =========================================
DUST
========================================= */

const dustGeo =
    new THREE.BufferGeometry();

const dustPos = [];

for(let i=0;i<1500;i++){

    dustPos.push(
        (Math.random()-.5)*80,
        (Math.random()-.5)*40,
        (Math.random()-.5)*80
    );
}

dustGeo.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(
        dustPos,
        3
    )
);

const dustMat =
    new THREE.PointsMaterial({
        color:0xffffff,
        size:0.06,
        transparent:true,
        opacity:.35
    });

const dust =
    new THREE.Points(
        dustGeo,
        dustMat
    );

scene.add(dust);

/* =========================================
FLOOR
========================================= */

const floor =
    new THREE.Mesh(
        new THREE.PlaneGeometry(100,100),
        new THREE.MeshPhongMaterial({
            color:0x111111
        })
    );

floor.rotation.x = -Math.PI/2;
floor.position.y = -5;

scene.add(floor);

/* =========================================
ROCK
========================================= */

const loader =
    new THREE.TextureLoader();

const rockTextures = {

    0:loader.load("Rock0.png"),
    10:loader.load("Rock10.png"),
    20:loader.load("Rock20.png"),
    30:loader.load("Rock30.png"),
    40:loader.load("Rock40.png")
};

const rockMaterial =
    new THREE.SpriteMaterial({
        map:rockTextures[0],
        transparent:true
    });

const rock =
    new THREE.Sprite(
        rockMaterial
    );

rock.scale.set(10,10,1);

scene.add(rock);

/* =========================================
PARTICLES
========================================= */

const particles = [];

function createParticles(amount,power){

    for(let i=0;i<amount;i++){

        const geo =
            new THREE.SphereGeometry(
                0.03 +
                Math.random()*0.08
            );

        const mat =
            new THREE.MeshBasicMaterial({

                color:[
                    0xffffff,
                    0x999999,
                    0xffcc88
                ][
                    Math.floor(
                        Math.random()*3
                    )
                ]
            });

        const mesh =
            new THREE.Mesh(
                geo,
                mat
            );

        mesh.position.set(
            (Math.random()-.5)*2,
            (Math.random()-.5)*2,
            (Math.random()-.5)*2
        );

        mesh.velocity =
            new THREE.Vector3(
                (Math.random()-.5)*power,
                Math.random()*power,
                (Math.random()-.5)*power
            );

        mesh.life = 80;

        scene.add(mesh);

        particles.push(mesh);
    }
}

/* =========================================
ANIMATION
========================================= */

function animate(){

    requestAnimationFrame(animate);

    dust.rotation.y += 0.0004;

    for(let i=particles.length-1;i>=0;i--){

        const p = particles[i];

        p.position.add(p.velocity);

        p.velocity.y -= 0.01;

        p.life--;

        if(p.life <= 0){

            scene.remove(p);

            particles.splice(i,1);

            continue;
        }
    }

    renderer.render(scene,camera);
}

animate();

/* =========================================
AUDIO
========================================= */

const bgm =
    document.getElementById("bgm");

const hitSound =
    document.getElementById("hitSound");

const bombSound =
    document.getElementById("bombSound");

bgm.volume = .45;

function fadeVolume(
    audio,
    target,
    speed
){

    const interval =
        setInterval(()=>{

        if(audio.volume < target){

            audio.volume =
                Math.min(
                    target,
                    audio.volume + speed
                );

        }else{

            audio.volume =
                Math.max(
                    target,
                    audio.volume - speed
                );
        }

        if(
            Math.abs(
                audio.volume-target
            ) < .02
        ){

            audio.volume = target;

            clearInterval(interval);
        }

    },40);
}

/* =========================================
UI
========================================= */

const menu =
    document.getElementById("menu");

const startBtn =
    document.getElementById("startBtn");

const rankingBtn =
    document.getElementById("rankingBtn");

const overlay =
    document.getElementById("overlay");

const overlayText =
    document.getElementById("overlayText");

const countdown =
    document.getElementById("countdown");

const guide =
    document.getElementById("guide");

const counter =
    document.getElementById("counter");

const timer =
    document.getElementById("timer");

const statusText =
    document.getElementById("status");

const rankingScreen =
    document.getElementById("rankingScreen");

const rankingList =
    document.getElementById("rankingList");

const endScreen =
    document.getElementById("endScreen");

/* =========================================
STATE
========================================= */

let gameStarted = false;
let gameEnded = false;

let webcamReady = false;

let count = 0;

let startTime = 0;

let recordedFinalTime = 0;

/* =========================================
WEBCAM
========================================= */

const video =
    document.getElementById("webcam");

let mpCamera = null;

/* =========================================
POSE
========================================= */

const pose =
    new Pose({

        locateFile:(file)=>{

            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose@0.5/${file}`;
        }

    });

pose.setOptions({

    modelComplexity:1,

    smoothLandmarks:true,

    minDetectionConfidence:.5,

    minTrackingConfidence:.5
});

pose.onResults(onPoseResults);

/* =========================================
TRACKING
========================================= */
let ready = false;
let cooldown = false;

let lastHandY = 0;

/* =========================================
WEBCAM INIT
========================================= */

async function initWebcam(){

    if(webcamReady) return;

    overlay.style.display = "flex";

    overlayText.innerText =
        "웹캠 연결을 요청 중입니다...";

    overlayText.style.opacity = 1;

    // file:// 또는 미지원 방어
    if(
        !navigator.mediaDevices ||
        !navigator.mediaDevices.getUserMedia
    ){

        overlayText.innerText =
            "보안 문제로 웹캠을 켤 수 없습니다.\n(반드시 로컬 웹 서버로 실행해야 합니다)";

        await sleep(3000);

        overlay.style.display = "none";

        overlayText.style.opacity = 0;

        return false;
    }

    try{

        const stream =
            await navigator.mediaDevices
            .getUserMedia({
                video:{
                    width:1280,
                    height:720
                }
            });

        video.srcObject = stream;

        await new Promise(resolve=>{

            video.onloadedmetadata = ()=>{

                resolve();
            };
        });

        overlayText.innerText =
            "웹캠이 연결되었습니다!";

        webcamReady = true;

        await sleep(1500);

        overlayText.style.opacity = 0;

        await sleep(1000);

    }catch(err){

        overlayText.innerText =
            "웹캠 권한이 필요합니다.";

        await sleep(2000);

        overlay.style.display = "none";

        overlayText.style.opacity = 0;

        return false;
    }

    return true;
}

/* =========================================
TRACK START
========================================= */

async function startTracking(){

    if(mpCamera) return;

    mpCamera =
        new Camera(video,{

            onFrame: async ()=>{

                await pose.send({
                    image:video
                });
            },

            width:1280,
            height:720
        });

    mpCamera.start();
}

/* =========================================
START GAME
========================================= */

startBtn.addEventListener(
    "click",
    async ()=>{

    startBtn.disabled = true;

    if(bgm.paused){

        bgm.play().catch(()=>{});
    }

    overlay.style.display = "flex";

    overlayText.innerText =
        "준비하세요";

    overlayText.style.opacity = 1;

    guide.style.opacity = 1;

    await sleep(1200);

    overlayText.style.opacity = 0;

    await sleep(700);

    const arr =
        ["3","2","1","START"];

    for(const t of arr){

        countdown.innerText = t;

        countdown.style.opacity = 1;

        await sleep(700);

        countdown.style.opacity = 0;

        await sleep(250);
    }

    video.classList.add("playing");

    overlay.style.display = "none";

    menu.style.display = "none";

    fadeVolume(bgm,.05,.02);

    gameStarted = true;

    startTime = performance.now();

    updateTimer();
});

/* =========================================
TIMER
========================================= */

function updateTimer(){

    if(gameEnded) return;

    const t =
        (
            (performance.now()-startTime)
            /1000
        ).toFixed(2);

    timer.innerText =
        `${t}s`;

    requestAnimationFrame(
        updateTimer
    );
}

/* =========================================
POSE RESULTS
========================================= */
function onPoseResults(results){
    if(!gameStarted || gameEnded || !results.poseLandmarks) return;

    const lm = results.poseLandmarks;
    const leftWrist = lm[15];
    const rightWrist = lm[16];
    const nose = lm[0];
    
    // 양손의 평균 높이
    const handY = (leftWrist.y + rightWrist.y) / 2;
    
    // 단순 속도 (현재위치 - 이전위치)
    const velocity = handY - lastHandY;
    lastHandY = handY;

    // 1. 준비 상태: 손이 코(nose) 근처까지만 올라가도 준비 완료
    if(handY < nose.y) {
        ready = true;
        statusText.innerText = "READY";
    }

    // 2. 타격 인식: 준비됨 + 쿨타임 아님 + 아래로 움직임(속도 0.015 이상)
    // 기존의 '어깨 아래까지 내려야 함(shoulder.y + .05)' 조건을 삭제하여 
    // 위에서 빠르게 까딱거리기만 해도 인식되게 만듦
    if(ready && !cooldown && velocity > 0.015){
        
        ready = false;
        cooldown = true;

        hitRock(Math.min(velocity * 60, 3));

        // 쿨타임을 0.55초 -> 0.12초로 줄여서 엄청난 연타 허용
        setTimeout(()=>{
            cooldown = false;
        }, 120);
    }
}

/* =========================================
HIT
========================================= */
function hitRock(power){
    count++;
    counter.innerText = count;

    counter.style.transform = "translateX(-50%) scale(1.2)";
    setTimeout(()=>{
        counter.style.transform = "translateX(-50%) scale(1)";
    }, 70);

    // 연타 시 효과음 중첩 재생
    const sound = hitSound.cloneNode();
    sound.volume = Math.min(0.5 + power * 0.1, 1);
    sound.play().catch(()=>{});

    document.body.classList.add("shake");
    if(this.shakeTimer) clearTimeout(this.shakeTimer);
    this.shakeTimer = setTimeout(()=>{
        document.body.classList.remove("shake");
    }, 80);

    let shakeCount = 0;
    const level = Math.floor(count/20); // 바위가 변하는 기준 조정
    const intensity = 0.06 + level * 0.02;

    const interval = setInterval(()=>{
        rock.position.x = (Math.random()-.5) * intensity;
        rock.position.y = (Math.random()-.5) * intensity;
        shakeCount++;
        if(shakeCount > 5){
            rock.position.set(0,0,0);
            clearInterval(interval);
        }
    }, 16);

    createParticles(
        15 + level * 5,
        0.1 + level * 0.05 + power * 0.05
    );

    // 이미지가 변하는 타이밍을 100번에 맞게 재조정
    if(count >= 40) rock.material.map = rockTextures[40];
    else if(count >= 30) rock.material.map = rockTextures[30];
    else if(count >= 20) rock.material.map = rockTextures[20];
    else if(count >= 10) rock.material.map = rockTextures[10];
    
    rock.material.needsUpdate = true;

    // 목표 타격 횟수 100번
    if(count >= 50){
        endGame();
    }
}

/* =========================================
END GAME
========================================= */

async function endGame(){

    gameEnded = true;

    bombSound.volume = 1;

    bombSound.play().catch(()=>{});

    createParticles(
        500,
        1.2
    );

    rock.visible = false;

    document.body.classList.add(
        "shake"
    );

    fadeVolume(
        bgm,
        .45,
        .01
    );

video.classList.remove("playing"); // 게임 끝나면 카메라 작아짐

    // 닉네임 치는 시간이 안 들어가도록, 끝난 순간의 시간을 저장해둠!
    recordedFinalTime = parseFloat(((performance.now() - startTime) / 1000).toFixed(2));

    document.getElementById("finalTime").innerText = `기록 : ${recordedFinalTime}초`;

    await sleep(1800);

    endScreen.style.display =
        "flex";
}

/* =========================================
RANKING
========================================= */

rankingBtn.addEventListener(
    "click",
    ()=>{

    rankingScreen.style.display =
        "flex";

    renderRanking();
});

document
.getElementById(
    "rankingCloseBtn"
)
.addEventListener(
    "click",

function renderRanking(){

    rankingList.innerHTML = "";

    const data =
        JSON.parse(
            localStorage.getItem(
                "rockRanking"
            ) || "[]"
        );

    data.sort(
        (a,b)=>a.time-b.time
    );

    if(data.length===0){

        rankingList.innerHTML =
            `<div class="rankItem">
                기록 없음
            </div>`;

        return;
    }

    data.slice(0,10)
    .forEach((r,i)=>{

        const div =
            document.createElement(
                "div"
            );

        div.className =
            "rankItem";

        if(i===0)
            div.classList.add(
                "gold"
            );

        if(i===1)
            div.classList.add(
                "silver"
            );

        if(i===2)
            div.classList.add(
                "bronze"
            );

        div.innerHTML =
            `${i+1}등 - ${r.name} - ${r.time.toFixed(2)}초`;

        rankingList.appendChild(div);
    });
}

/* =========================================
SAVE
========================================= */

document
.getElementById("saveBtn")
.addEventListener(
    "click",
    ()=>{

    const name =
        document
        .getElementById(
            "nickname"
        )
        .value.trim()
        || "PLAYER";

const finalTime = recordedFinalTime;

    const data =
        JSON.parse(
            localStorage.getItem(
                "rockRanking"
            ) || "[]"
        );

    data.push({

        name,

        time:finalTime,

        date:new Date()
        .toLocaleDateString()
    });

    data.sort(
        (a,b)=>a.time-b.time
    );

    localStorage.setItem(
        "rockRanking",
        JSON.stringify(data)
    );

    document
    .getElementById(
        "saveMessage"
    )
    .style.opacity = 1;

    document
    .getElementById(
        "saveBtn"
    )
    .style.display = "none";
});

    "resize",

        window.innerWidth,

    );

});

/* =========================================
기록 초기화 기능
========================================= */
document.getElementById("resetRankingBtn").addEventListener("click", () => {
    if(confirm("정말 기록을 모두 지우시겠습니까?")) {
        // 1. 컴퓨터 저장소에서 기록 싹 지우기
        localStorage.removeItem("rockRanking"); 
        
        // 2. 지금 보고 있는 화면에서도 기록 리스트 싹 비우기
        const rankingList = document.getElementById("rankingList");
        if(rankingList) rankingList.innerHTML = ""; 
        
        alert("기록이 초기화되었습니다!");
    }
});
